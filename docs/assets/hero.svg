<!-- social-simulation-replications hero (repo-doc-format). -->
<svg width="100%" viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Social Simulation Replications</title>
<desc>A collection of classic social-science simulation papers reimplemented in Rust and Python, built on shared simulator frameworks.</desc>
<style>
  .ts    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; fill: #444441; }
  .tl    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12px; font-weight: 600; fill: #534AB7; letter-spacing: 2px; }
  .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 30px; font-weight: 600; fill: #2C2C2A; }
  .tile  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12.5px; font-weight: 500; fill: #2C2C2A; }
  .glab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.5px; }
  .teal-fill   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.7; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.7; }
  .arrd { stroke: #534AB7; stroke-width: 1.4; fill: none; }
  @media (prefers-color-scheme: dark) {
    .ts    { fill: #C7C5BD; }
    .tl    { fill: #AFA9EC; }
    .title { fill: #E5E5E2; }
    .tile  { fill: #E5E5E2; }
    .glab  { fill: #8C8B85; }
    .teal-fill   { fill: #0F6E56; stroke: #5DCAA5; }
    .purple-fill { fill: #534AB7; stroke: #AFA9EC; }
    .arrd { stroke: #AFA9EC; }
  }
</style>
<defs>
<marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="tl"    x="44" y="100">REPLICATIONS · COLLECTION</text>
<text class="title" x="42" y="144">Social Simulation</text>
<text class="title" x="42" y="182">Replications</text>
<text class="ts"    x="44" y="216">Classic social-science papers, reimplemented in Rust + Python.</text>

<text class="glab" x="520" y="76">replications</text>
<rect class="teal-fill" x="520" y="84" width="100" height="40" rx="7"/>
<text class="tile" x="570" y="109" text-anchor="middle">Schelling</text>
<rect class="teal-fill" x="628" y="84" width="100" height="40" rx="7"/>
<text class="tile" x="678" y="109" text-anchor="middle">Axelrod</text>
<rect class="teal-fill" x="736" y="84" width="100" height="40" rx="7"/>
<text class="tile" x="786" y="109" text-anchor="middle">Logistello</text>
