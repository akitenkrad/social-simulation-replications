<!-- social-simulation-replications hero (repo-doc-format). Motif: emergence (micro -> macro). -->
<svg width="100%" viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Social Simulation Replications</title>
<desc>A collection of classic social-science simulation papers reimplemented in Rust and Python. The motif shows the unifying idea of agent-based social simulation: local interaction rules among many agents give rise to emergent macro-level patterns.</desc>
<style>
  .ts    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; fill: #444441; }
  .tl    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12px; font-weight: 600; fill: #534AB7; letter-spacing: 2px; }
  .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 30px; font-weight: 600; fill: #2C2C2A; }
  .glab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 600; fill: #888780; letter-spacing: 1px; }
  .pan   { fill: #F4F3EF; stroke: #E0DED6; stroke-width: 1; }
  .dotA  { fill: #0F6E56; }
  .dotB  { fill: #534AB7; }
  .arrd  { stroke: #534AB7; stroke-width: 1.6; fill: none; }
  @media (prefers-color-scheme: dark) {
    .ts    { fill: #C7C5BD; }
    .tl    { fill: #AFA9EC; }
    .title { fill: #E5E5E2; }
    .glab  { fill: #8C8B85; }
    .pan   { fill: #232320; stroke: #3A3A34; }
    .dotA  { fill: #5DCAA5; }
    .dotB  { fill: #AFA9EC; }
    .arrd  { stroke: #AFA9EC; }
  }
</style>
<defs>
<marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- left: title block -->
<text class="tl"    x="44" y="100">REPLICATIONS · COLLECTION</text>
<text class="title" x="42" y="144">Social Simulation</text>
<text class="title" x="42" y="182">Replications</text>
<text class="ts"    x="44" y="216">Classic social-science papers, reimplemented in Rust + Python.</text>

<!-- right: emergence motif (micro -> macro) -->
<text class="glab" x="504" y="80">LOCAL RULES</text>
<text class="glab" x="716" y="80">GLOBAL PATTERNS</text>

