# Single source of truth for the replication catalog.
#
# Edit this file, then regenerate the README tables and docs/replications*.md with:
#
#     python3 tools/gen_catalog.py
#
# Fields per [[replication]]:
#   key          identifier (lowercase author+year, e.g. "schelling1971"); also the table label
#   repo         GitHub repo name under github.com/akitenkrad/<repo> (usually == key)
#   author       paper author string, kept in English (e.g. "Schelling", "Chuang et al.")
#   year         integer publication year (used for sorting)
#   year_display optional display string when the year is a range (e.g. "1994–1999")
#   title        paper title, kept in English
#   paradigm     one of: "classic-abm", "llm-social", "game-ai"
#   domain       only for paradigm = "llm-social"; one of:
#                "opinion-norms", "economy", "competition-conflict", "platform-scale"
#   theme_en     short theme label (English)
#   theme_ja     short theme label (Japanese)

